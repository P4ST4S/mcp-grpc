version: v2
# The buf module is rooted at proto/mcp/grpc/v1 (see buf.yaml), so the proto's
# path relative to the module is just transport.proto. With source_relative and
# out: mcpgrpcv1, the stubs land directly in mcpgrpcv1/ at the repo root — the
# public, non-internal package the interop story requires.
managed:
  enabled: false
plugins:
  - local: protoc-gen-go
    out: mcpgrpcv1
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: mcpgrpcv1
    opt: paths=source_relative
